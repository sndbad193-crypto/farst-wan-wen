<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأصول السيادية - V6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gemini-gradient: linear-gradient(135deg, #4285f4 0%, #9b72cb 50%, #d96570 100%); }
        body { font-family: 'Cairo', sans-serif; background-color: #020203; color: #f8fafc; overflow: hidden; }
        .bg-grid { background-size: 50px 50px; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .option-box { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
        .option-box:hover { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); transform: translateY(-3px); }
        #bulkModal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #hy-hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gemini-gradient); padding: 10px 30px; border-radius: 50px; z-index: 10000; display: none; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-grid h-screen flex" onload="initSystem()">

    <div id="hy-hud" class="text-sm">تمت العملية بنجاح 🛡️</div>

    <div id="bulkModal">
        <div class="max-w-2xl w-full glass-card rounded-[2rem] p-8 border-purple-500/30">
            <h2 class="text-2xl font-black mb-4">إضافة سجلات جديدة (بالمحافظة)</h2>
            <input type="text" id="govInput" placeholder="اسم المحافظة (مثلاً: الأنبار)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-4 outline-none focus:border-purple-500 text-white">
            <textarea id="bulkInput" class="w-full h-64 bg-black/40 border border-white/10 rounded-xl p-4 font-mono text-sm mb-6 outline-none focus:border-purple-500" placeholder="الصق الأسماء هنا.. اسم في كل سطر"></textarea>
            <div class="flex gap-4">
                <button onclick="processBulkData()" class="flex-grow py-4 bg-purple-600 hover:bg-purple-700 text-white font-black rounded-xl shadow-lg transition-all">بدء الحفظ والتصدير ⚡</button>
                <button onclick="closeBulkModal()" class="px-6 py-4 bg-white/5 rounded-xl">إلغاء</button>
            </div>
        </div>
    </div>

    <aside class="w-72 bg-black/90 border-l border-white/5 flex flex-col p-6">
        <h1 class="text-xl font-black text-white mb-8"><span class="text-purple-500">◈</span> اللوحة الأم</h1>
        <nav class="space-y-3">
            <button onclick="openBulkModal()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5 hover:bg-purple-500/20 text-sm font-bold transition-all text-gray-300 hover:text-white"><span>⚡</span> إضافة وحفظ ملف</button>
            <button onclick="importTrigger.click()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5 hover:bg-blue-500/20 text-sm font-bold transition-all text-gray-300 hover:text-white"><span>📂</span> رفع ملف السجلات</button>
            <input type="file" id="importTrigger" class="hidden" onchange="importVault(this)">
            <button onclick="exportVault()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/5 hover:bg-green-500/20 text-sm font-bold transition-all text-gray-300 hover:text-white"><span>🛡️</span> تصدير نسخة احتياطية</button>
            <hr class="border-white/5 my-4">
            <button onclick="clearMatrixData()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white text-sm font-bold transition-all"><span>🗑️</span> مسح النظام</button>
        </nav>
    </aside>

    <main class="flex-grow p-10 overflow-y-auto custom-scroll">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black mb-1">نظام إدارة الأصول</h2>
                <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Mainframe / <span class="text-purple-500">Governorate Matrix</span></p>
            </div>
            <div class="glass-card px-8 py-4 rounded-2xl text-center">
                <p class="text-[10px] text-gray-500 font-bold uppercase">إجمالي السجلات</p>
                <p id="totalCountDisplay" class="text-2xl font-black text-white">0</p>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-4 gap-6" id="matrixContainer">
            </section>
    </main>

    <script>
        const DB_KEY = 'HY_SOVEREIGN_V6_VAULT';
        let vault = [];

        function initSystem() {
            const raw = localStorage.getItem(DB_KEY);
            vault = raw ? JSON.parse(raw) : [];
            renderUI();
        }

        function hyHud(m) {
            const h = document.getElementById('hy-hud');
            h.innerText = m; h.style.display = 'block';
            setTimeout(() => h.style.display = 'none', 3000);
        }

        function openBulkModal() { document.getElementById('bulkModal').style.display = 'flex'; }
        function closeBulkModal() { document.getElementById('bulkModal').style.display = 'none'; }

        // الوظيفة الأساسية: إضافة وحفظ في ملف تلقائي
        function processBulkData() {
            const names = document.getElementById('bulkInput').value.split('\n').filter(n => n.trim() !== "");
            const gov = document.getElementById('govInput').value || "غير محدد";

            if(names.length === 0) return hyHud("يرجى إدخال أسماء!");

            names.forEach(name => {
                vault.push({
                    id: `ID-${Math.floor(Math.random()*10000)}`,
                    name: name.trim(),
                    gov: gov,
                    date: new Date().toLocaleDateString()
                });
            });

            localStorage.setItem(DB_KEY, JSON.stringify(vault));
            renderUI();
            closeBulkModal();
            exportVault(); // حفظ في ملف فوراً
            hyHud(`تم حفظ وتنزيل ملف بـ ${names.length} سجل`);
        }

        function renderUI() {
            const container = document.getElementById('matrixContainer');
            document.getElementById('totalCountDisplay').innerText = vault.length;
            if (vault.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 font-bold">لا توجد سجلات حالياً في النظام</div>`;
                return;
            }
            container.innerHTML = vault.map((m, index) => `
                <div class="option-box">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] text-purple-500 font-bold uppercase">${m.id}</span>
                        <button onclick="deleteItem(${index})" aria-label="حذف السجل" class="text-gray-600 hover:text-red-500 text-xs">✕</button>
                    </div>
                    <h3 class="text-white font-bold mb-1">${m.name}</h3>
                    <p class="text-[10px] text-gray-500 font-bold">📍 ${m.gov}</p>
                </div>
            `).join('');
        }

        function deleteItem(index) {
            if(confirm("هل أنت متأكد من حذف هذا السجل؟")) {
                vault.splice(index, 1);
                localStorage.setItem(DB_KEY, JSON.stringify(vault));
                renderUI();
                hyHud("تم حذف السجل بنجاح");
            }
        }

        // حفظ بملف JSON
        function exportVault() {
            const dataStr = JSON.stringify(vault, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Registry_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            hyHud("تم تصدير السجل كملف خارجي 🛡️");
        }

        // رفع ملف موجود للبرنامج
        function importVault(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const importedData = JSON.parse(e.target.result);
                vault = [...vault, ...importedData]; // دمج مع البيانات الحالية
                localStorage.setItem(DB_KEY, JSON.stringify(vault));
                renderUI();
                hyHud("تم رفع ودمج السجلات بنجاح");
            };
            reader.readAsText(file);
        }

        function clearMatrixData() {
            if(confirm("سيتم تصفير النظام، تأكد من أنك تملك نسخة ملف السجل!")) {
                localStorage.removeItem(DB_KEY);
                vault = [];
                renderUI();
            }
        }
    </script>
</body>
</html>
